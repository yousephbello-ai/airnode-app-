<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airnode Web App</title>
  <style>
    :root {
      --bg-dark: #0f1322;
      --bg-card: #181e36;
      --bg-input: #121629;
      --accent-blue: #2563eb;
      --accent-light: #38bdf8;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --bubble-self: #2563eb;
      --bubble-other: #1e293b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app-container {
      width: 100%;
      max-width: 1200px;
      height: 100vh;
      display: flex;
      background: var(--bg-dark);
    }

    /* Sidebar */
    .sidebar {
      width: 350px;
      border-right: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      background: var(--bg-dark);
    }

    .sidebar-header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .my-number-badge {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      font-size: 14px;
    }

    .new-chat-btn {
      background: var(--accent-light);
      border: none;
      color: #0f1322;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .recent-list {
      flex: 1;
      overflow-y: auto;
    }

    .recent-item {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      gap: 12px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.2s;
    }

    .recent-item:hover, .recent-item.active {
      background: rgba(255,255,255,0.05);
    }

    .recent-info {
      flex: 1;
      overflow: hidden;
    }

    .recent-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .recent-msg {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Main Chat View */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-dark);
    }

    .chat-header {
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .status-online {
      font-size: 12px;
      color: #10b981;
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg-bubble {
      max-width: 65%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.4;
      position: relative;
      word-break: break-word;
    }

    .msg-bubble.sent {
      align-self: flex-end;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg-bubble.received {
      align-self: flex-start;
      background: var(--bubble-other);
      color: var(--text-main);
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }

    .chat-input-area {
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: var(--bg-dark);
    }

    .input-field {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 12px 20px;
      color: white;
      outline: none;
    }

    .send-btn {
      background: var(--accent-light);
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: #0f1322;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: var(--bg-card);
      padding: 24px;
      border-radius: 12px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .modal-content input {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: var(--bg-input);
      color: white;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .modal-actions button {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    /* Mobile handling */
    @media (max-width: 768px) {
      .sidebar { width: 100%; }
      .chat-area { display: none; width: 100%; }
      body.mobile-chat-active .sidebar { display: none; }
      body.mobile-chat-active .chat-area { display: flex; }
      .back-btn { display: block !important; }
    }

    .back-btn {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="my-number-badge">
          <div class="avatar-circle" id="myAvatar">--</div>
          <div>
            <div style="font-size: 11px; color: var(--text-muted);">MY NUMBER</div>
            <div style="font-weight: bold; font-size: 14px;" id="displayMyNumber">Loading...</div>
          </div>
        </div>
        <button class="new-chat-btn" onclick="openNewChatModal()">+</button>
      </div>

      <div class="recent-list" id="recentList"></div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-header">
        <button class="back-btn" onclick="closeMobileChat()">&larr;</button>
        <div class="avatar-circle" id="activeChatAvatar">--</div>
        <div>
          <div style="font-weight: bold;" id="activeChatName">Select a chat</div>
          <div class="status-online" id="chatStatus">online</div>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input-area">
        <input type="text" class="input-field" id="msgInput" placeholder="Message Airnode..." disabled onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- New Chat Modal -->
  <div class="modal" id="newChatModal">
    <div class="modal-content">
      <h3>Start New Chat</h3>
      <input type="text" id="newNumberInput" placeholder="Enter phone number (e.g. 18143606598)">
      <div class="modal-actions">
        <button onclick="closeNewChatModal()">Cancel</button>
        <button style="background: var(--accent-light); color: #000;" onclick="startNewChat()">Chat</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    let myNumber = localStorage.getItem('airnode_my_number');
    let activeRecipient = null;
    let recentChats = JSON.parse(localStorage.getItem('airnode_recent_chats') || '[]');

    // Helper: Normalize any string down to digits only
    function cleanNumber(num) {
      return num ? String(num).replace(/\D/g, '') : '';
    }

    // Initialize Identity
    if (!myNumber) {
      const input = prompt("Enter your phone number to register/login:");
      myNumber = cleanNumber(input);
      if (myNumber) {
        localStorage.setItem('airnode_my_number', myNumber);
      } else {
        location.reload();
      }
    } else {
      myNumber = cleanNumber(myNumber);
    }

    document.getElementById('displayMyNumber').innerText = myNumber;
    document.getElementById('myAvatar').innerText = myNumber.slice(-2);

    renderChatList();

    // Modal Control
    function openNewChatModal() { document.getElementById('newChatModal').style.display = 'flex'; }
    function closeNewChatModal() { document.getElementById('newChatModal').style.display = 'none'; }

    function startNewChat() {
      const rawInput = document.getElementById('newNumberInput').value.trim();
      const cleaned = cleanNumber(rawInput);

      if (!cleaned) return alert('Enter a valid phone number!');
      if (cleaned === myNumber) return alert("You can't chat with yourself!");

      addContactToRecent(cleaned, "Tap to send a message...");
      closeNewChatModal();
      openChat(cleaned);
    }

    function addContactToRecent(number, lastMsg = '') {
      const cleanedTarget = cleanNumber(number);
      const existing = recentChats.find(c => cleanNumber(c.number) === cleanedTarget);
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      if (existing) {
        existing.lastMsg = lastMsg || existing.lastMsg;
        existing.time = time;
      } else {
        recentChats.unshift({ number: cleanedTarget, lastMsg, time });
      }

      localStorage.setItem('airnode_recent_chats', JSON.stringify(recentChats));
      renderChatList();
    }

    function renderChatList() {
      const container = document.getElementById('recentList');
      container.innerHTML = '';

      recentChats.forEach(chat => {
        const cleanChatNum = cleanNumber(chat.number);
        const div = document.createElement('div');
        div.className = `recent-item ${activeRecipient === cleanChatNum ? 'active' : ''}`;
        div.onclick = () => openChat(cleanChatNum);

        div.innerHTML = `
          <div class="avatar-circle">${cleanChatNum.slice(-2)}</div>
          <div class="recent-info">
            <div class="recent-name">${cleanChatNum}</div>
            <div class="recent-msg">${chat.lastMsg}</div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function openChat(recipientNumber) {
      activeRecipient = cleanNumber(recipientNumber);

      document.getElementById('activeChatName').innerText = activeRecipient;
      document.getElementById('activeChatAvatar').innerText = activeRecipient.slice(-2);

      document.getElementById('msgInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('chatMessages').innerHTML = '';

      document.body.classList.add('mobile-chat-active');
      renderChatList();

      socket.emit('join_chat', { 
        myNumber: myNumber, 
        recipientNumber: activeRecipient 
      });
    }

    function closeMobileChat() {
      document.body.classList.remove('mobile-chat-active');
    }

    function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !activeRecipient) return;

      socket.emit('send_private_message', {
        sender: myNumber,
        recipient: activeRecipient,
        message: text
      });

      input.value = '';
    }

    function appendMessage(msg) {
      const container = document.getElementById('chatMessages');
      const msgSender = cleanNumber(msg.sender);
      const isSelf = msgSender === myNumber;

      const div = document.createElement('div');
      div.className = `msg-bubble ${isSelf ? 'sent' : 'received'}`;
      div.innerHTML = `
        <div>${msg.message}</div>
        <div class="msg-time">${msg.time || ''}</div>
      `;

      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    // Handle Incoming Messages
    socket.on('receive_private_message', (msg) => {
      const msgSender = cleanNumber(msg.sender);
      const msgRecipient = cleanNumber(msg.recipient);

      // Render if relevant to currently opened chat window
      if (msgSender === activeRecipient || (msgSender === myNumber && msgRecipient === activeRecipient)) {
        appendMessage(msg);
      }

      // Update sidebar
      const otherParty = msgSender === myNumber ? msgRecipient : msgSender;
      addContactToRecent(otherParty, msg.message);
    });
  </script>
</body>
</html>
