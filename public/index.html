<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airnode Messenger</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    /* ================= Dynamic Theme Variables ================= */
    :root {
      --bg-main: #0b141a;
      --bg-sidebar: #111b21;
      --bg-card: #202c33;
      --bg-input: #2a3942;
      --bg-chat-starter: #182229;
      --text-main: #e9edef;
      --text-muted: #8696a0;
      --border-color: #222d34;
      --accent: #00a884;
      --msg-sent: #005c4b;
      --msg-received: #202c33;
    }

    [data-theme="light"] {
      --bg-main: #efeae2;
      --bg-sidebar: #ffffff;
      --bg-card: #f0f2f5;
      --bg-input: #e9edef;
      --bg-chat-starter: #f7f8fa;
      --text-main: #111b21;
      --text-muted: #667781;
      --border-color: #e9edef;
      --accent: #00a884;
      --msg-sent: #d9fdd3;
      --msg-received: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { display: flex; height: 100vh; background: var(--bg-main); color: var(--text-main); overflow: hidden; transition: background 0.3s, color 0.3s; }

    /* Splash Screen */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: var(--bg-main);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .splash-logo {
      width: 80px; height: 80px; background: var(--accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 38px; font-weight: bold; color: #fff;
      box-shadow: 0 0 20px rgba(0, 168, 132, 0.4); animation: pulse 1.5s infinite ease-in-out;
    }
    .splash-title { margin-top: 20px; font-size: 24px; font-weight: 600; color: var(--text-main); }
    .spinner {
      margin-top: 30px; width: 30px; height: 30px; border: 3px solid rgba(0, 168, 132, 0.2);
      border-radius: 50%; border-top-color: var(--accent); animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

    /* Layout */
    .app-container { display: flex; width: 100vw; height: 100vh; opacity: 0; transition: opacity 0.4s ease; }
    
    .sidebar {
      width: 360px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color);
      padding: 20px; display: flex; flex-direction: column; gap: 20px; flex-shrink: 0;
    }
    .sidebar-header { display: flex; justify-content: space-between; align-items: center; }
    
    .icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 6px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .icon-btn:hover { background: var(--bg-card); color: var(--text-main); }
    .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }

    .profile-card {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-card); padding: 12px 15px; border-radius: 10px;
    }
    .profile-left { display: flex; align-items: center; gap: 12px; }
    
    /* Interactive Profile Photo Avatar */
    .avatar-wrapper { position: relative; cursor: pointer; }
    .avatar {
      width: 48px; height: 48px; background: var(--accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 20px; color: #fff; overflow: hidden; background-size: cover; background-position: center;
    }
    .avatar-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); border-radius: 50%; display: flex;
      align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s;
    }
    .avatar-wrapper:hover .avatar-overlay { opacity: 1; }
    .avatar-overlay svg { width: 18px; height: 18px; fill: #fff; }

    .user-info h4 { font-size: 13px; color: var(--text-muted); }
    .user-info p { font-size: 14px; color: var(--text-main); margin-top: 2px; font-weight: bold; }

    .copy-btn { background: var(--bg-input); border: none; color: var(--accent); cursor: pointer; padding: 8px; border-radius: 6px; }
    .copy-btn svg { width: 18px; height: 18px; fill: currentColor; }

    .chat-starter { background: var(--bg-chat-starter); padding: 15px; border-radius: 10px; }
    .chat-starter h3 { font-size: 13px; margin-bottom: 10px; color: var(--text-muted); text-transform: uppercase; }
    .chat-starter input { width: 100%; padding: 12px; background: var(--bg-input); border: none; border-radius: 6px; color: var(--text-main); margin-bottom: 10px; font-size: 14px; outline: none; }
    .chat-starter button { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 6px; color: #fff; font-weight: bold; cursor: pointer; font-size: 14px; }

    /* Chat Panel */
    .chat-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }
    .chat-header { padding: 15px 20px; background: var(--bg-card); border-bottom: 1px solid var(--border-color); font-weight: bold; display: flex; align-items: center; gap: 12px; }
    .back-btn { display: none; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 50%; }
    .back-btn svg { width: 24px; height: 24px; fill: currentColor; }

    .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    
    .message { max-width: 75%; padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
    .message.sent { align-self: flex-end; background: var(--msg-sent); color: var(--text-main); }
    .message.received { align-self: flex-start; background: var(--msg-received); color: var(--text-main); }
    .message media, .message img, .message video { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; }
    .message audio { width: 100%; margin-top: 5px; }

    .input-area { padding: 12px 15px; background: var(--bg-card); display: flex; align-items: center; gap: 10px; }
    .input-area input[type="text"] { flex: 1; padding: 12px; background: var(--bg-input); border: none; border-radius: 8px; color: var(--text-main); font-size: 14px; outline: none; }
    .input-area button { padding: 12px 18px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; }

    /* Settings Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 10000; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: var(--bg-sidebar); width: 320px; padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-color); }

    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top:0; left:0; right:0; bottom:0; background-color: var(--bg-input); transition: .3s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: #fff; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(20px); }

    @media (max-width: 768px) {
      .sidebar { width: 100%; height: 100%; border-right: none; }
      .chat-panel { display: none; width: 100%; height: 100%; }
      body.mobile-chat-active .sidebar { display: none; }
      body.mobile-chat-active .chat-panel { display: flex; }
      body.mobile-chat-active .back-btn { display: flex; }
    }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-logo">A</div>
    <div class="splash-title">Airnode</div>
    <div class="spinner"></div>
  </div>

  <!-- Main App -->
  <div class="app-container" id="appContainer">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Airnode</h2>
        <button class="icon-btn" title="Settings" onclick="openSettings()">
          <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </button>
      </div>
      
      <!-- Profile Card with Avatar Picker -->
      <div class="profile-card">
        <div class="profile-left">
          <div class="avatar-wrapper" onclick="triggerProfilePhotoUpload()">
            <div class="avatar" id="myAvatar">A</div>
            <div class="avatar-overlay">
              <svg viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/></svg>
            </div>
          </div>
          <input type="file" id="profilePhotoInput" accept="image/*" style="display: none;" onchange="uploadProfilePhoto(event)">

          <div class="user-info">
            <h4>Your Number</h4>
            <p id="myNumberDisplay">Generating...</p>
          </div>
        </div>
        <button class="copy-btn" title="Copy Number" onclick="copyMyNumber()">
          <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>
      </div>

      <div class="chat-starter">
        <h3>Start Conversation</h3>
        <input type="text" id="recipientInput" placeholder="Enter recipient's number (+1...)">
        <button onclick="startPrivateChat()">Message User</button>
      </div>
    </div>

    <!-- Chat Panel -->
    <div class="chat-panel">
      <div class="chat-header">
        <button class="back-btn" onclick="closeMobileChat()">
          <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <span id="chatTitle">Select or enter a number to start messaging</span>
      </div>

      <div class="messages-container" id="messagesBox"></div>
      
      <div class="input-area">
        <!-- Media / File Attachment Button -->
        <button class="icon-btn" title="Attach Media or File" onclick="triggerFileUpload()" id="attachBtn" disabled>
          <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .83-.67 1.5-1.5 1.5s-1.5-.67-1.5-1.5V6H9v9.5a3 3 0 0 0 6 0V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
        </button>
        <input type="file" id="fileAttachmentInput" style="display: none;" onchange="sendFileAttachment(event)">

        <input type="text" id="msgInput" placeholder="Write a message..." disabled>
        <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Settings</h3>
        <button class="icon-btn" onclick="closeSettings()">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="setting-item">
        <span>Dark Mode</span>
        <label class="switch">
          <input type="checkbox" id="themeToggle" onchange="toggleTheme(this.checked)">
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <script>
    // Splash screen
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('splash-screen').style.opacity = '0';
        document.getElementById('splash-screen').style.visibility = 'hidden';
        document.getElementById('appContainer').style.opacity = '1';
      }, 1200);
    });

    // Theme logic
    const savedTheme = localStorage.getItem('airnode_theme') || 'dark';
    if (savedTheme === 'light') {
      document.body.setAttribute('data-theme', 'light');
      document.getElementById('themeToggle').checked = false;
    }

    function toggleTheme(isDark) {
      if (isDark) {
        document.body.removeAttribute('data-theme');
        localStorage.setItem('airnode_theme', 'dark');
      } else {
        document.body.setAttribute('data-theme', 'light');
        localStorage.setItem('airnode_theme', 'light');
      }
    }

    function openSettings() { document.getElementById('settingsModal').classList.add('active'); }
    function closeSettings() { document.getElementById('settingsModal').classList.remove('active'); }

    // Profile Photo Avatar logic
    const savedAvatar = localStorage.getItem('airnode_profile_photo');
    if (savedAvatar) {
      const avatarEl = document.getElementById('myAvatar');
      avatarEl.style.backgroundImage = `url(${savedAvatar})`;
      avatarEl.innerText = '';
    }

    function triggerProfilePhotoUpload() {
      document.getElementById('profilePhotoInput').click();
    }

    function uploadProfilePhoto(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const photoData = e.target.result;
        localStorage.setItem('airnode_profile_photo', photoData);
        const avatarEl = document.getElementById('myAvatar');
        avatarEl.style.backgroundImage = `url(${photoData})`;
        avatarEl.innerText = '';
      };
      reader.readAsDataURL(file);
    }

    const socket = io();

    // Unique user phone number
    let myNumber = localStorage.getItem('airnode_my_number');
    if (!myNumber) {
      const randomSuffix = Math.floor(1000000 + Math.random() * 9000000);
      myNumber = `+1 (814) ${randomSuffix}`;
      localStorage.setItem('airnode_my_number', myNumber);
    }

    document.getElementById('myNumberDisplay').innerText = myNumber;
    let currentRecipient = null;

    function copyMyNumber() {
      navigator.clipboard.writeText(myNumber).then(() => alert('Phone number copied to clipboard! 📋'));
    }

    function startPrivateChat() {
      const recipient = document.getElementById('recipientInput').value.trim();
      if (!recipient) return alert('Please enter a valid phone number!');
      if (recipient === myNumber) return alert("You can't message your own number!");

      currentRecipient = recipient;
      document.getElementById('chatTitle').innerText = `Chatting with: ${currentRecipient}`;
      document.getElementById('msgInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('attachBtn').disabled = false;
      document.getElementById('messagesBox').innerHTML = '';

      document.body.classList.add('mobile-chat-active');
      socket.emit('join_chat', { myNumber, recipientNumber: currentRecipient });
    }

    function closeMobileChat() { document.body.classList.remove('mobile-chat-active'); }

    // File / Media attachment upload logic
    function triggerFileUpload() {
      document.getElementById('fileAttachmentInput').click();
    }

    function sendFileAttachment(event) {
      const file = event.target.files[0];
      if (!file || !currentRecipient) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const fileData = e.target.result;
        socket.emit('send_private_message', {
          sender: myNumber,
          recipient: currentRecipient,
          message: '',
          file: {
            data: fileData,
            name: file.name,
            type: file.type
          }
        });
      };
      reader.readAsDataURL(file);
    }

    socket.on('load_history', (history) => {
      const box = document.getElementById('messagesBox');
      box.innerHTML = '';
      history.forEach(msg => appendMessage(msg));
    });

    function sendMessage() {
      const text = document.getElementById('msgInput').value.trim();
      if (!text || !currentRecipient) return;

      socket.emit('send_private_message', { sender: myNumber, recipient: currentRecipient, message: text });
      document.getElementById('msgInput').value = '';
    }

    socket.on('receive_private_message', (msg) => { appendMessage(msg); });

    // Render text, images, videos, audio, and documents dynamically
    function appendMessage(msg) {
      const box = document.getElementById('messagesBox');
      const div = document.createElement('div');
      const isMe = msg.sender === myNumber;
      
      div.className = `message ${isMe ? 'sent' : 'received'}`;

      if (msg.message) {
        const p = document.createElement('p');
        p.innerText = msg.message;
        div.appendChild(p);
      }

      if (msg.file) {
        const fileType = msg.file.type;
        if (fileType.startsWith('image/')) {
          const img = document.createElement('img');
          img.src = msg.file.data;
          div.appendChild(img);
        } else if (fileType.startsWith('video/')) {
          const video = document.createElement('video');
          video.src = msg.file.data;
          video.controls = true;
          div.appendChild(video);
        } else if (fileType.startsWith('audio/')) {
          const audio = document.createElement('audio');
          audio.src = msg.file.data;
          audio.controls = true;
          div.appendChild(audio);
        } else {
          const link = document.createElement('a');
          link.href = msg.file.data;
          link.download = msg.file.name;
          link.innerText = `📄 ${msg.file.name}`;
          link.style.color = '#00a884';
          div.appendChild(link);
        }
      }

      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }
  </script>
</body>
</html>
