<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Airnode</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --an-bg-main: #0b0f19;
      --an-sidebar: #111827;
      --an-card: #1f2937;
      --an-card-hover: #374151;
      --an-input: #1f2937;
      --an-neon-cyan: #00f2fe;
      --an-neon-blue: #4facfe;
      --an-accent-purple: #7c3aed;
      --an-bubble-sent: linear-gradient(135deg, #0052d4 0%, #4364f7 50%, #6fb1fc 100%);
      --an-bubble-recv: #1f2937;
      --an-text-main: #f9fafb;
      --an-text-muted: #9ca3af;
      --an-border: #1f2937;
      --an-check: #00f2fe;
    }

    [data-theme="light"] {
      --an-bg-main: #f3f4f6;
      --an-sidebar: #ffffff;
      --an-card: #e5e7eb;
      --an-card-hover: #d1d5db;
      --an-input: #f3f4f6;
      --an-neon-cyan: #0284c7;
      --an-neon-blue: #2563eb;
      --an-accent-purple: #7c3aed;
      --an-bubble-sent: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
      --an-bubble-recv: #ffffff;
      --an-text-main: #111827;
      --an-text-muted: #6b7280;
      --an-border: #e5e7eb;
      --an-check: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { display: flex; height: 100vh; width: 100vw; background: var(--an-bg-main); color: var(--an-text-main); overflow: hidden; }

    /* --- Splash Screen --- */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: var(--an-bg-main); display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    .splash-logo {
      width: 76px; height: 76px; background: linear-gradient(135deg, var(--an-neon-cyan), var(--an-accent-purple)); border-radius: 22px; display: flex; align-items: center; justify-content: center;
      font-size: 38px; font-weight: 800; color: #fff; box-shadow: 0 0 25px rgba(0, 242, 254, 0.4);
    }
    .splash-title { margin-top: 18px; font-size: 22px; font-weight: 700; color: var(--an-text-main); letter-spacing: 1px; }

    /* --- Main App Layout --- */
    .app-container { display: flex; width: 100vw; height: 100vh; }

    /* Left Sidebar / Chats Screen */
    .sidebar {
      width: 380px; background: var(--an-sidebar); border-right: 1px solid var(--an-border);
      display: flex; flex-direction: column; flex-shrink: 0; position: relative;
    }

    .sidebar-header {
      padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; background: var(--an-sidebar);
    }
    .brand-title {
      font-size: 24px; font-weight: 800;
      background: linear-gradient(135deg, var(--an-neon-cyan), var(--an-accent-purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .header-actions { display: flex; gap: 14px; align-items: center; }
    .icon-btn { background: none; border: none; color: var(--an-text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
    .icon-btn:hover { color: var(--an-neon-cyan); }
    .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }

    /* Search Bar */
    .search-box { padding: 8px 16px; }
    .search-input-wrapper {
      display: flex; align-items: center; gap: 10px; background: var(--an-card);
      padding: 10px 16px; border-radius: 12px; color: var(--an-text-muted); border: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .search-input-wrapper:focus-within { border-color: var(--an-neon-cyan); }
    .search-input-wrapper input {
      background: none; border: none; outline: none; color: var(--an-text-main); font-size: 14px; width: 100%;
    }

    /* Filters Pill Row */
    .filters-row { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; }
    .pill {
      background: var(--an-card); color: var(--an-text-muted); font-size: 13px; font-weight: 600;
      padding: 6px 14px; border-radius: 20px; cursor: pointer; white-space: nowrap; border: 1px solid transparent; transition: all 0.2s;
    }
    .pill.active, .pill:hover { background: rgba(0, 242, 254, 0.15); color: var(--an-neon-cyan); border-color: rgba(0, 242, 254, 0.3); }

    /* Chat List Container */
    .chat-list { flex: 1; overflow-y: auto; padding: 6px 0; }
    .chat-item {
      display: flex; align-items: center; gap: 14px; padding: 12px 18px; cursor: pointer;
      transition: background 0.2s; border-left: 3px solid transparent;
    }
    .chat-item:hover, .chat-item.active { background: var(--an-card); border-left-color: var(--an-neon-cyan); }
    
    .chat-avatar {
      width: 48px; height: 48px; border-radius: 16px;
      background: linear-gradient(135deg, var(--an-neon-blue), var(--an-accent-purple));
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: #fff;
      flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .chat-info { flex: 1; min-width: 0; }
    .chat-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .chat-name { font-size: 15px; font-weight: 600; color: var(--an-text-main); text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
    .chat-time { font-size: 11px; color: var(--an-text-muted); }
    .chat-last-msg { font-size: 13px; color: var(--an-text-muted); text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

    /* Floating Action Button (+) */
    .fab-btn {
      position: absolute; bottom: 70px; right: 20px; width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--an-neon-cyan), var(--an-neon-blue)); border-radius: 16px; border: none; color: #0b0f19;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); transition: transform 0.2s, box-shadow 0.2s; z-index: 10;
    }
    .fab-btn:active { transform: scale(0.92); }
    .fab-btn svg { width: 26px; height: 26px; fill: #0b0f19; }

    /* Bottom Navigation Bar */
    .bottom-nav {
      display: flex; justify-content: space-around; align-items: center;
      padding: 10px 0 8px; background: var(--an-sidebar); border-top: 1px solid var(--an-border);
    }
    .nav-tab { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--an-text-muted); font-size: 11px; font-weight: 600; cursor: pointer; border: none; background: none; }
    .nav-tab.active { color: var(--an-neon-cyan); }

    /* --- Right Chat Panel --- */
    .chat-panel {
      flex: 1; display: flex; flex-direction: column; background: var(--an-bg-main);
      background-image: radial-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 0); background-size: 28px 28px;
    }
    .chat-header {
      padding: 12px 20px; background: var(--an-sidebar); border-bottom: 1px solid var(--an-border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .chat-header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn { display: none; background: none; border: none; color: var(--an-text-muted); cursor: pointer; }

    .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

    /* Message Bubbles */
    .message {
      max-width: 68%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.4;
      position: relative; word-wrap: break-word; display: flex; flex-direction: column;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .message.sent { align-self: flex-end; background: var(--an-bubble-sent); color: #ffffff; border-bottom-right-radius: 2px; }
    .message.received { align-self: flex-start; background: var(--an-bubble-recv); color: var(--an-text-main); border-bottom-left-radius: 2px; border: 1px solid var(--an-border); }

    .msg-meta {
      display: flex; align-items: center; justify-content: flex-end; gap: 4px;
      font-size: 10px; opacity: 0.8; margin-top: 4px; align-self: flex-end;
    }
    .msg-check { color: var(--an-check); font-weight: bold; font-size: 11px; }

    .message img, .message video { max-width: 100%; border-radius: 10px; margin-top: 6px; }
    .message audio { width: 100%; margin-top: 6px; }

    /* Chat Input Bar */
    .input-area { padding: 12px 20px; background: var(--an-sidebar); display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--an-border); }
    .input-area input[type="text"] {
      flex: 1; padding: 12px 18px; background: var(--an-card); border: 1px solid transparent;
      border-radius: 12px; color: var(--an-text-main); font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .input-area input[type="text"]:focus { border-color: var(--an-neon-cyan); }
    
    .send-circle-btn {
      width: 44px; height: 44px; background: linear-gradient(135deg, var(--an-neon-cyan), var(--an-neon-blue)); border-radius: 12px;
      border: none; color: #0b0f19; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); transition: transform 0.2s;
    }
    .send-circle-btn:active { transform: scale(0.92); }

    /* New Chat Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 10000; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: var(--an-sidebar); width: 340px; padding: 24px; border-radius: 20px; border: 1px solid var(--an-border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .modal-box h3 { font-size: 18px; margin-bottom: 14px; color: var(--an-text-main); }
    .modal-box input { width: 100%; padding: 12px 16px; background: var(--an-card); border: 1px solid var(--an-border); border-radius: 10px; color: #fff; font-size: 14px; outline: none; margin-bottom: 16px; }
    .modal-box button { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--an-neon-cyan), var(--an-neon-blue)); border: none; border-radius: 10px; color: #0b0f19; font-weight: 700; cursor: pointer; }

    /* Mobile View */
    @media (max-width: 768px) {
      .sidebar { width: 100%; height: 100%; border-right: none; }
      .chat-panel { display: none; width: 100%; height: 100%; }

      body.mobile-chat-active .sidebar { display: none; }
      body.mobile-chat-active .chat-panel { display: flex; }
      body.mobile-chat-active .back-btn { display: flex; }
    }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-logo">A</div>
    <div class="splash-title">Airnode</div>
  </div>

  <!-- App Main Layout -->
  <div class="app-container">
    
    <!-- Left Sidebar / Chat List -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="brand-title">Airnode</span>
        <div class="header-actions">
          <button class="icon-btn" onclick="triggerProfileUpload()" title="Profile Photo">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
          </button>
          <input type="file" id="profileInput" accept="image/*" style="display: none;" onchange="uploadProfile(event)">
          <button class="icon-btn" onclick="openNewChatModal()" title="New Chat">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          </button>
        </div>
      </div>

      <!-- Search Input -->
      <div class="search-box">
        <div class="search-input-wrapper">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" placeholder="Search conversations..." id="searchInput" oninput="filterChats()">
        </div>
      </div>

      <!-- Filter Pills -->
      <div class="filters-row">
        <button class="pill active">All</button>
        <button class="pill">Unread</button>
        <button class="pill">Favourites</button>
        <button class="pill">Groups</button>
      </div>

      <!-- Active Chats List -->
      <div class="chat-list" id="chatsListContainer"></div>

      <!-- Glowing Floating Action Button (+) -->
      <button class="fab-btn" onclick="openNewChatModal()" title="Start New Chat">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>

      <!-- Bottom Nav Tabs -->
      <div class="bottom-nav">
        <button class="nav-tab active">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>
          <span>Chats</span>
        </button>
        <button class="nav-tab">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
          <span>Updates</span>
        </button>
        <button class="nav-tab">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
          <span>Channels</span>
        </button>
        <button class="nav-tab">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
          <span>Calls</span>
        </button>
      </div>
    </div>

    <!-- Right Chat Screen -->
    <div class="chat-panel">
      <div class="chat-header">
        <div class="chat-header-left">
          <button class="back-btn" onclick="closeMobileChat()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          </button>
          <div class="chat-avatar" id="activeChatAvatar">?</div>
          <div>
            <div style="font-weight: 600; font-size: 16px;" id="activeChatName">Select a contact to start messaging</div>
            <div style="font-size: 11px; color: var(--an-neon-cyan);" id="activeChatStatus">online</div>
          </div>
        </div>
      </div>

      <!-- Messages Stream -->
      <div class="messages-container" id="messagesBox"></div>

      <!-- Message Input Bar -->
      <div class="input-area">
        <button class="icon-btn" onclick="triggerFileUpload()" id="attachBtn" disabled>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .83-.67 1.5-1.5 1.5s-1.5-.67-1.5-1.5V6H9v9.5a3 3 0 0 0 6 0V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
        </button>
        <input type="file" id="fileInput" style="display: none;" onchange="sendFile(event)">

        <input type="text" id="msgInput" placeholder="Message Airnode..." disabled onkeypress="handleKeyPress(event)">
        
        <button class="send-circle-btn" id="sendBtn" onclick="sendMessage()" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

  </div>

  <!-- Start New Chat Modal -->
  <div class="modal-overlay" id="newChatModal">
    <div class="modal-box">
      <h3>New Airnode Chat</h3>
      <input type="text" id="newNumberInput" placeholder="Enter recipient's number (+1...)">
      <button onclick="startNewChat()">Start Chat</button>
    </div>
  </div>

  <script>
    // Hide Splash
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('splash-screen').style.opacity = '0';
        document.getElementById('splash-screen').style.visibility = 'hidden';
      }, 1000);
    });

    const socket = io();

    // User's Phone Number Setup
    let myNumber = localStorage.getItem('airnode_my_number');
    if (!myNumber) {
      myNumber = `+1 (814) ${Math.floor(1000000 + Math.random() * 9000000)}`;
      localStorage.setItem('airnode_my_number', myNumber);
    }

    // Load saved contacts list
    let recentChats = JSON.parse(localStorage.getItem('airnode_recent_chats') || '[]');
    let activeRecipient = null;

    renderChatList();

    function openNewChatModal() { document.getElementById('newChatModal').classList.add('active'); }
    function closeNewChatModal() { document.getElementById('newChatModal').classList.remove('active'); }

    function startNewChat() {
      const number = document.getElementById('newNumberInput').value.trim();
      if (!number) return alert('Enter a phone number!');
      if (number === myNumber) return alert("You can't chat with yourself!");

      addContactToRecent(number, "Tap to send a message...");
      closeNewChatModal();
      openChat(number);
    }

    function addContactToRecent(number, lastMsg = '') {
      const existing = recentChats.find(c => c.number === number);
      const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      if (existing) {
        existing.lastMsg = lastMsg || existing.lastMsg;
        existing.time = now;
      } else {
        recentChats.unshift({ number, lastMsg, time: now });
      }

      localStorage.setItem('airnode_recent_chats', JSON.stringify(recentChats));
      renderChatList();
    }

    function renderChatList() {
      const container = document.getElementById('chatsListContainer');
      container.innerHTML = '';

      if (recentChats.length === 0) {
        container.innerHTML = `<div style="padding: 24px; text-align: center; color: var(--an-text-muted); font-size: 13px;">No active chats. Tap + to start a conversation!</div>`;
        return;
      }

      recentChats.forEach(chat => {
        const div = document.createElement('div');
        div.className = `chat-item ${activeRecipient === chat.number ? 'active' : ''}`;
        div.onclick = () => openChat(chat.number);

        div.innerHTML = `
          <div class="chat-avatar">${chat.number.substring(chat.number.length - 2)}</div>
          <div class="chat-info">
            <div class="chat-top-row">
              <span class="chat-name">${chat.number}</span>
              <span class="chat-time">${chat.time || ''}</span>
            </div>
            <div class="chat-last-msg">${chat.lastMsg || 'Tap to chat'}</div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function openChat(recipientNumber) {
      activeRecipient = recipientNumber;
      document.getElementById('activeChatName').innerText = recipientNumber;
      document.getElementById('activeChatAvatar').innerText = recipientNumber.substring(recipientNumber.length - 2);

      document.getElementById('msgInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('attachBtn').disabled = false;

      document.body.classList.add('mobile-chat-active');
      renderChatList();

      socket.emit('join_chat', { myNumber, recipientNumber: activeRecipient });
    }

    function closeMobileChat() { document.body.classList.remove('mobile-chat-active'); }

    function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

    function sendMessage() {
      const text = document.getElementById('msgInput').value.trim();
      if (!text || !activeRecipient) return;

      socket.emit('send_private_message', { sender: myNumber, recipient: activeRecipient, message: text });
      addContactToRecent(activeRecipient, text);
      document.getElementById('msgInput').value = '';
    }

    socket.on('load_history', (history) => {
      const box = document.getElementById('messagesBox');
      box.innerHTML = '';
      history.forEach(msg => appendMessage(msg));
    });

    socket.on('receive_private_message', (msg) => {
      if (msg.sender === activeRecipient || msg.sender === myNumber) {
        appendMessage(msg);
      }
      addContactToRecent(msg.sender === myNumber ? msg.recipient : msg.sender, msg.message || 'Media file');
    });

    function appendMessage(msg) {
      const box = document.getElementById('messagesBox');
      const div = document.createElement('div');
      const isMe = msg.sender === myNumber;
      const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      div.className = `message ${isMe ? 'sent' : 'received'}`;

      if (msg.message) {
        const p = document.createElement('div');
        p.innerText = msg.message;
        div.appendChild(p);
      }

      if (msg.file) {
        if (msg.file.type.startsWith('image/')) {
          const img = document.createElement('img'); img.src = msg.file.data; div.appendChild(img);
        } else if (msg.file.type.startsWith('video/')) {
          const video = document.createElement('video'); video.src = msg.file.data; video.controls = true; div.appendChild(video);
        } else if (msg.file.type.startsWith('audio/')) {
          const audio = document.createElement('audio'); audio.src = msg.file.data; audio.controls = true; div.appendChild(audio);
        }
      }

      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.innerHTML = `${timeStr} ${isMe ? '<span class="msg-check">✓✓</span>' : ''}`;
      div.appendChild(meta);

      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function triggerFileUpload() { document.getElementById('fileInput').click(); }
    
    function sendFile(e) {
      const file = e.target.files[0];
      if (!file || !activeRecipient) return;

      const reader = new FileReader();
      reader.onload = function(evt) {
        socket.emit('send_private_message', {
          sender: myNumber,
          recipient: activeRecipient,
          message: '',
          file: { data: evt.target.result, name: file.name, type: file.type }
        });
        addContactToRecent(activeRecipient, '📷 Media Attachment');
      };
      reader.readAsDataURL(file);
    }

    function triggerProfileUpload() { document.getElementById('profileInput').click(); }
    function uploadProfile(e) {
      const file = e.target.files[0];
      if (file) alert('Airnode profile updated successfully!');
    }
  </script>
</body>
</html>
